<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Mega 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

body {
  background: linear-gradient(135deg, #0d0d0d, #1a0033);
  color: white;
  text-align: center;
}

/* 🔥 HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 25px;
  padding: 20px;
}

.logo {
  width: 120px;
}

/* BOTONES */
.botones {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 14px 30px;
  border-radius: 30px;
  background: linear-gradient(90deg, #6a00ff, #ff00c8);
  color: white;
  text-decoration: none;
  transition: 0.3s;
  font-weight: 600;
  box-shadow: 0 0 15px rgba(255, 0, 200, 0.6);
}

.btn:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 25px rgba(255, 0, 200, 0.9);
}

/* SECCIONES */
section {
  min-height: 100vh;
  padding: 120px 25px; /* 🔥 MÁS ESPACIO */
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 25px;
}

#contacto { background: #0f0f0f; }
#quienes { background: #140022; }
#trabajos { background: #1a0033; }

/* TEXTO */
section p {
  max-width: 650px;
  margin: auto;
  line-height: 1.8;
  font-size: 16px;
}

/* BOTÓN VOLVER */
.volver {
  margin-top: 40px;
  display: inline-block;
  padding: 12px 25px;
  border-radius: 25px;
  background: linear-gradient(90deg, #6a00ff, #ff00c8);
  color: white;
  text-decoration: none;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-top: 40px;
}

/* 🔥 IMÁGENES OPTIMIZADAS */
.img-responsive {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 15px;
  transition: 0.3s;
}

.img-responsive:hover {
  transform: scale(1.05);
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  .botones {
    flex-direction: column;
  }

  .btn {
    width: 80%;
    max-width: 300px;
  }

  .img-responsive {
    height: 200px;
  }
}
</style>
</head>

<body>

<!-- 🔥 INICIO -->
<div class="hero" id="inicio">

  <img src="LOGO MEGA.png" alt="LOGO MEGA" class="LOGO MEGA">

  <div class="botones">
    <a href="#contacto" class="btn">Contacto</a>
    <a href="#quienes" class="btn">Quiénes</a>
    <a href="#trabajos" class="btn">Trabajos</a>
  </div>
</div>

<!-- CONTACTO -->
<section id="contacto">
  <p>Correo: contacto@mega3d.com</p>
  <p>Tel: +52 123 456 7890</p>

  <a href="#inicio" class="volver">⬅ Volver</a>
</section>

<!-- QUIENES -->
<section id="quienes">
  <p>
    Diseñamos, fabricamos e instalamos letreros luminosos 3D,
    fachadas de aluminio compuesto, neón flex y LED inteligente.
  </p>

  <a href="#inicio" class="volver">⬅ Volver</a>
</section>

<!-- TRABAJOS -->
<section id="trabajos">

  <div class="galeria">
    <img src="trabajo1.jpg" class="img-responsive">
    <img src="trabajo2.jpg" class="img-responsive">
    <img src="trabajo3.jpg" class="img-responsive">
  </div>

  <a href="#inicio" class="volver">⬅ Volver</a>
</section>

</body>
</html>
