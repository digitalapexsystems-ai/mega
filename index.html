<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grupo Mega 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

body {
  background: linear-gradient(135deg, #0d0d0d, #1a0033);
  color: white;
}

/* 🔥 CONTENEDOR GENERAL */
.container {
  width: 100%;
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* 🔥 HERO */
.hero {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  gap: 25px;
}

/* BOTONES */
.botones {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 14px 30px;
  border-radius: 30px;
  background: linear-gradient(90deg, #6a00ff, #ff00c8);
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(255, 0, 200, 0.5);
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255, 0, 200, 0.9);
}

/* SECCIONES */
section {
  min-height: 100vh;
  display: flex;
  align-items: center;
}

.section-content {
  width: 100%;
  text-align: center;
  padding: 80px 20px;
}

#contacto { background: #0f0f0f; }
#quienes { background: #140022; }
#trabajos { background: #1a0033; }

/* TEXTO */
p {
  max-width: 600px;
  margin: 0 auto 20px;
  line-height: 1.8;
  font-size: 16px;
}

/* BOTÓN VOLVER */
.volver {
  display: inline-block;
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 25px;
  background: linear-gradient(90deg, #6a00ff, #ff00c8);
  color: white;
  text-decoration: none;
}

/* GALERÍA */
.galeria {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 30px;
}

/* IMÁGENES */
.img-responsive {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
}

/* 📱 TABLET */
@media (min-width: 600px) {
  .galeria {
    grid-template-columns: repeat(2, 1fr);
  }

  .img-responsive {
    height: 240px;
  }
}

/* 💻 PC */
@media (min-width: 1024px) {
  .galeria {
    grid-template-columns: repeat(3, 1fr);
  }

  .img-responsive {
    height: 260px;
  }

  .botones {
    gap: 25px;
  }
}
</style>
</head>

<body>

<!-- 🔥 INICIO -->
<div class="hero" id="inicio">
  <div class="container">

    <div class="botones">
      <a href="#contacto" class="btn">Contacto</a>
      <a href="#quienes" class="btn">Quiénes</a>
      <a href="#trabajos" class="btn">Trabajos</a>
    </div>

  </div>
</div>

<!-- CONTACTO -->
<section id="contacto">
  <div class="section-content">
    <p>Correo: contacto@mega3d.com</p>
    <p>Tel: +52 123 456 7890</p>

    <a href="#inicio" class="volver">⬅ Volver</a>
  </div>
</section>

<!-- QUIENES -->
<section id="quienes">
  <div class="section-content">
    <p>
      Diseñamos, fabricamos e instalamos letreros luminosos 3D,
      fachadas de aluminio compuesto, neón flex y LED inteligente.
    </p>

    <a href="#inicio" class="volver">⬅ Volver</a>
  </div>
</section>

<!-- TRABAJOS -->
<section id="trabajos">
  <div class="section-content">

    <div class="galeria">
      <img src="trabajo1.jpg" class="img-responsive">
      <img src="trabajo2.jpg" class="img-responsive">
      <img src="trabajo3.jpg" class="img-responsive">
    </div>

    <a href="#inicio" class="volver">⬅ Volver</a>
  </div>
</section>

</body>
</html>
